<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退出登录</title>
    <link rel="stylesheet" th:href="@{/auth/css/common.css}">
</head>
<body class="landing-body">
<main class="landing-shell">
    <header class="landing-header">
        <a th:href="@{/auth/index.html}" class="landing-brand">
            <span class="landing-brand-mark">⚡</span>
            <span>G2Rain IAM</span>
        </a>
    </header>

    <section class="landing-grid">
        <div class="landing-panel feature-panel">
            <h1 class="title">退出登录成功</h1>
            <p class="desc">
                为了保障账号安全，你的会话已被清理。你可以稍后返回首页继续操作。
            </p>
            <div class="feature-list">
                <div class="feature-card">
                    <div class="feature-title">安全保障</div>
                    <div class="feature-desc">退出后将终止当前登录会话，降低账号被滥用风险。</div>
                </div>
                <div class="feature-card">
                    <div class="feature-title">快速返回</div>
                    <div class="feature-desc">系统将在倒计时结束后自动跳转到首页。</div>
                </div>
            </div>
        </div>

        <div class="landing-panel action-panel landing-op-links">
            <h2 class="title">已退出</h2>
            <div class="countdown">
                <span id="countdown"><span class="pulse">1</span></span> 秒后跳转到首页...
            </div>
            <div style="margin-top: 18px;">
                <a th:href="@{/auth/index.html}"
                   class="btn btn-outline btn-lg"
                   style="width: auto; padding: 12px 24px;">
                    立即跳转
                </a>
            </div>
        </div>
    </section>

    <footer class="landing-footer">
        G2Rain IAM
    </footer>
</main>

<script>
    (function () {
        let countdown = 1;
        const countdownElement = document.getElementById('countdown');
        const timer = setInterval(function () {
            countdown--;
            if (countdownElement) {
                countdownElement.innerHTML = '<span class="pulse">' + countdown + '</span>';
            }
            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = '/auth/index.html';
            }
        }, 1000);
    })();
</script>
</body>
</html>
