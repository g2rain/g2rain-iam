<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册账号</title>
    <style th:replace="~{fragments/styles-common :: common}"></style>
</head>
<body class="landing-body">
<main class="landing-shell">
    <header class="landing-header">
        <a th:href="@{/auth/index.html}" class="landing-brand">
            <span class="landing-brand-mark">⚡</span>
            <span>G2Rain IAM</span>
        </a>
        <div class="landing-header-links">
            <a th:href="@{/auth/authorize}" class="link-muted">立即登录</a>
        </div>
    </header>

    <section class="landing-grid">
        <div class="landing-panel feature-panel">
            <h2 class="title">IAM 平台介绍</h2>
            <p class="desc">在统一认证入口上完成账号注册，便于后续快速接入业务系统。</p>
            <div class="feature-list">
                <div class="feature-card">
                    <div class="feature-title">信息校验</div>
                    <div class="feature-desc">密码确认与输入规则校验，提升注册成功率。</div>
                </div>
                <div class="feature-card">
                    <div class="feature-title">安全防护</div>
                    <div class="feature-desc">对账号基础信息进行规范化采集，降低安全风险。</div>
                </div>
                <div class="feature-card">
                    <div class="feature-title">可持续扩展</div>
                    <div class="feature-desc">认证能力可持续扩展，适配后续策略治理。</div>
                </div>
            </div>
        </div>

        <div class="landing-panel action-panel landing-op-form">
            <h2 class="title">注册账号</h2>
            <form method="POST" action="/auth/passport_register">
                <input type="hidden" id="clientId" name="clientId" th:value="${clientId} ?: ''">
                <input type="hidden" id="redirectUri" name="redirectUri" th:value="${redirectUri} ?: ''">
                <input type="hidden" id="state" name="state" th:value="${state} ?: ''">

                <div class="form-group">
                    <label for="username">用户名<span class="required-asterisk" aria-hidden="true">*</span></label>
                    <input type="text" id="username" name="username" th:value="${passport?.username} ?: ''"
                           required minlength="3" maxlength="32">
                </div>

                <div class="form-group">
                    <label for="password">密码<span class="required-asterisk" aria-hidden="true">*</span></label>
                    <input type="password" id="password" name="password"
                           required minlength="6" maxlength="64">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">确认密码<span class="required-asterisk" aria-hidden="true">*</span></label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>

                <div class="form-group">
                    <label for="captchaCode">数字验证码<span class="required-asterisk" aria-hidden="true">*</span></label>
                    <input type="hidden" id="captchaId" name="captchaId">
                    <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 10px;">
                        <input type="text"
                               id="captchaCode"
                               name="captchaCode"
                               required
                               inputmode="numeric"
                               autocomplete="off"
                               pattern="[0-9]{4}"
                               maxlength="4"
                               style="width: 110px;">
                        <img id="captchaImg" alt="captcha"
                             style="height: 44px; width: auto; border-radius: 8px; background: #fff;">
                        <button type="button" id="captchaRefresh" class="btn btn-outline btn-lg"
                                style="width: auto; margin-top: 0; padding: 12px 18px; flex: 0 0 auto;">换一张</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="realName">真实姓名<span class="required-asterisk" aria-hidden="true">*</span></label>
                    <input type="text" id="realName" name="realName" th:value="${passport?.realName} ?: ''"
                           required maxlength="32">
                </div>

                <div class="form-group">
                    <label for="sex">性别</label>
                    <select id="sex" name="sex" th:value="${passport?.sex} ?: ''">
                        <option value="">请选择</option>
                        <option value="MALE">男性</option>
                        <option value="FEMALE">女性</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="birthday">生日</label>
                    <input type="date" id="birthday" name="birthday" th:value="${passport?.birthday} ?: ''">
                </div>

                <div class="form-group">
                    <label for="idNo">身份证号</label>
                    <input type="text" id="idNo" name="idNo" th:value="${passport?.idNo} ?: ''">
                </div>

                <div class="form-group">
                    <label for="mobile">手机号码</label>
                    <input type="text" id="mobile" name="mobile" th:value="${passport?.mobile} ?: ''"
                           pattern="^1[3-9]\d{9}$" title="请输入有效的11位手机号码">
                </div>

                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input type="email" id="email" name="email" th:value="${passport?.email} ?: ''"
                           maxlength="64">
                </div>

                <div class="form-actions landing-form-actions">
                    <button type="submit" class="btn btn-primary btn-lg">注册</button>
                    <a th:href="@{/auth/login.html(clientId=${clientId ?: ''}, redirectUri=${redirectUri ?: ''}, state=${state ?: ''})}"
                       class="btn btn-outline btn-lg">已有账号？立即登录</a>
                </div>
            </form>

            <div class="error-message" th:if="${error != null and error != ''}" th:text="${error}"></div>
        </div>
    </section>

    <footer class="landing-footer">
        G2Rain IAM
    </footer>
</main>

<script>
    (function () {
        var captchaImg = document.getElementById('captchaImg');
        var captchaIdInput = document.getElementById('captchaId');
        var captchaCodeInput = document.getElementById('captchaCode');
        var refreshBtn = document.getElementById('captchaRefresh');

        async function fetchCaptcha() {
            try {
                var resp = await fetch('/auth/captcha/register', {method: 'GET'});
                if (!resp.ok) {
                    return;
                }
                var data = await resp.json();
                if (data && data.captchaId && data.imageBase64) {
                    captchaIdInput.value = data.captchaId;
                    captchaImg.src = 'data:image/png;base64,' + data.imageBase64;
                    captchaCodeInput.value = '';
                }
            } catch (e) {
                // 忽略：页面错误会由用户重试
            }
        }

        if (refreshBtn) {
            refreshBtn.addEventListener('click', fetchCaptcha);
        }

        fetchCaptcha();
    })();
 </script>

<script>
    (function () {
        var form = document.querySelector('form');
        var password = document.getElementById('password');
        var confirmPassword = document.getElementById('confirmPassword');

        function validatePasswordMatch() {
            if (password.value !== confirmPassword.value) {
                confirmPassword.setCustomValidity('两次输入的密码不一致');
            } else {
                confirmPassword.setCustomValidity('');
            }
        }

        if (password && confirmPassword && form) {
            password.addEventListener('input', validatePasswordMatch);
            confirmPassword.addEventListener('input', validatePasswordMatch);
            form.addEventListener('submit', function (e) {
                validatePasswordMatch();
                if (!form.checkValidity()) {
                    e.preventDefault();
                }
            });
        }
    })();
</script>
</body>
</html>
