server:
  port: ${SERVER_PORT:8082}

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: g2rain-iam
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB     # 单文件最大大小
      max-request-size: 10MB  # 总请求大小

  thymeleaf:
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    servlet:
      content-type: text/html

  cloud:
    # http://192.168.1.20:8080/index.html#/register
    nacos:
      # 服务端地址
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      # 注册中心
      discovery:
        username: ${SPRING_CLOUD_NACOS_DISCOVERY_USERNAME:nacos}        # 注册中心用户
        password: ${SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD:g2rain_nacos} # 注册中心密码
        namespace: ${SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE:dev}        # 隔离命名空间
        group: g2rain                                                   # 服务分组, 微服务实例归属类别
        service: ${spring.application.name}                             # 服务名，方便注册和发现
        heart-beat-interval: 5000                                       # 服务实例心跳间隔时间(毫秒）
        heart-beat-timeout: 15000                                       # 服务实例心跳超时时间(毫秒）
      # 配置中心
      config:
        username: ${SPRING_CLOUD_NACOS_CONFIG_USERNAME:nacos}           # 配置中心用户
        password: ${SPRING_CLOUD_NACOS_CONFIG_PASSWORD:g2rain_nacos}    # 配置中心密码
        namespace: ${SPRING_CLOUD_NACOS_CONFIG_NAMESPACE:dev}           # 隔离命名空间
        group: ${spring.application.name}                               # 配置分组, 默认 DEFAULT_GROUP
        file-extension: yaml                                            # 配置文件的后缀名
        refresh-enabled: true                                           # 是否开启配置动态刷新
        max-retry: 3                                                    # 最大充实次数
        timeout: 5000                                                   # 获取配置的超时时间(毫秒)
  # 外链 nacos 的配置中心的配置文件
  config:
    import:
      - optional:nacos:${spring.application.name}.yml?group=${spring.application.name}
      - optional:nacos:g2rain-token-keypair.yml?group=g2rain

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  tracing:
    enabled: true
    sampling:
      probability: 1.0              # 100% 采样（开发/生产初期建议，后续按需降低）
    propagation:
      type:
        - W3C                       # 强制使用 W3C 标准，确保跨语言/平台兼容性
    baggage:
      remote-fields:
        - requestId                 # 允许这个字段跨微服务通过 HTTP Header 传输
      correlation:
        fields:
          - requestId               #【核心】自动将这个字段同步到日志 MDC (%X{requestId})
  otlp:
    metrics:
      export:
        enabled: false              # 关闭指标导出
    tracing:
      export:
        enabled: false              # 关闭链路导出

g2rain:
  web:
    login-guard-interceptor-enabled: false
    identity-param-injector-enabled: false
    global-exception-filter-use-custom-json: true
    enable-result-mixin-filter: true
  iam:
    # IAM 对外访问根地址（无尾斜杠），部署时通过环境变量注入，如 https://43.138.13.145
    access-base-url: ${IAM_BASE_URL}
    # 业务平台（控制台）对外根地址（无尾斜杠），用于首页「立即登录」在无 redirectUri 时跳转到 /main/home。
    # 未配置时回退为 access-base-url（同机部署）；前后端分离时设为前端或网关地址，如 https://console.example.com
    platform-base-url: ${PLATFORM_BASE_URL:}
    dingtalk:
      # 与钉钉开放平台「回调地址」一致：callback-base-url + callback-path；未单独配置时与 access-base-url 相同
      callback-base-url: ${IAM_DINGTALK_CALLBACK_BASE_URL:${g2rain.iam.access-base-url}}
      callback-path: /auth/dingtalk/callback
      # 登录页「钉钉登录」的 bindMode（INTERNAL / THIRD_PARTY）；留空则不展示钉钉入口
      login-page-bind-mode: ${IAM_DINGTALK_LOGIN_BIND_MODE:}
      internal:
        client-id: ${DINGTALK_INTERNAL_CLIENT_ID:}
        client-secret: ${DINGTALK_INTERNAL_CLIENT_SECRET:}
      third-party:
        client-id: ${DINGTALK_THIRD_PARTY_CLIENT_ID:}
        client-secret: ${DINGTALK_THIRD_PARTY_CLIENT_SECRET:}
